timeout 10
default pinenote-quartz64
menu title PineNote OS (Quartz64-A)

label pinenote-quartz64
  kernel /boot/Image
  fdt /boot/rk3566-quartz64-a.dtb
  initrd /boot/initramfs-linux.img
  # console: ttyS2 @115200 (NOT the vendor 1.5M) so the Arduino UNO USB-UART
  # bridge can read it. ttyS2 is listed LAST so it becomes /dev/console — that's
  # where systemd puts the login + any emergency/rescue shell, so the serial
  # console is interactive. tty0 still gets kernel messages on the e-ink via fbcon.
  # earlycon: explicit uart8250 with NO baud so it inherits U-Boot's 115200.
  # root by LABEL (set by scripts/mk-sdimage.sh); fw_devlink=off eases EBC/
  # regulator probe ordering.
  # direct mode: direct_mode=1 selects hrdl's normal (direct) EBC path, NOT 3WIN —
  # this kernel is built WITHOUT CONFIG_DRM_ROCKCHIP_EBC_3WIN_MODE. temp_override=25
  # pins the temperature so the flaky tps65185 reads (-110) can't hang the refresh
  # thread and mask the result.
  append root=LABEL=pinenote-root rw rootwait earlycon=uart8250,mmio32,0xfe660000 console=tty0 console=ttyS2,115200 fw_devlink=off rockchip_ebc.direct_mode=1 rockchip_ebc.temp_override=25
