[Config]
Profiles=arch_p6_tar

[Distribution]
Distribution=arch
Architecture=arm64

[Build]
Incremental=true

[Content]
ExtraTrees=mkosi.sandbox
Packages=base,mkinitcpio,vulkan-panfrost,wireless-regdb,openssh,networkmanager,kitty,papirus-icon-theme,pipewire-jack,noto-fonts,noto-fonts-emoji,ttf-font-awesome,vim,util-linux,sudo,thunar,greetd,xournalpp
# Quartz64-A: linux-pinenote-hrdl-git is built locally (it ships the
# rk3566-quartz64-a DTB, which hrdl's prebuilt kernel does not) and staged into
# mkosi.volatilepackages/ by build-and-flash.sh, so mkosi installs ours instead
# of pulling the prebuilt kernel from hrdl's repo. Everything else still comes
# from hrdl's binary repo.
VolatilePackages=linux-pinenote-hrdl-git,brcm-firmware-pinenote,pinenote-arch,koreader-bin,pinenote-hrdl-sway-meta,pneink-theme-git
VolatilePackageDirectories=mkosi.volatilepackages
WithDocs=false
SourceDateEpoch=1745400000
Bootable=false
Bootloader=none
Timezone=Etc/UTC
Hostname=pinenote
RootPassword=rootpass
